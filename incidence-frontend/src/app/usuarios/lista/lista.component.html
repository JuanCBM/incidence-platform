<mat-toolbar color="primary">
  <button mat-icon-button (click)="volver()" matTooltip="Volver"><mat-icon>arrow_back</mat-icon></button>
  <mat-icon>people</mat-icon>
  <span class="toolbar-title">Usuarios</span>
  <span class="spacer"></span>
  <button mat-stroked-button (click)="crear()" class="btn-nuevo">
    <mat-icon>person_add</mat-icon> Nuevo usuario
  </button>
  <span class="toolbar-email">{{ emailUsuario }}</span>
  <button mat-icon-button (click)="cerrarSesion()" matTooltip="Cerrar sesión"><mat-icon>logout</mat-icon></button>
</mat-toolbar>

<div class="lista-container">
  <div *ngIf="cargando" class="estado-centro"><mat-spinner></mat-spinner></div>

  <div *ngIf="error && !cargando" class="estado-centro">
    <mat-icon class="icono-error">error_outline</mat-icon>
    <p>No se pudieron cargar los usuarios.</p>
    <button mat-raised-button color="primary" (click)="cargar()">Reintentar</button>
  </div>

  <mat-card *ngIf="!cargando && !error">
    <table mat-table [dataSource]="usuarios" class="full-width">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let u">{{ u.id }}</td>
      </ng-container>
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let u">{{ u.nombre }}</td>
      </ng-container>
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let u">{{ u.email }}</td>
      </ng-container>
      <ng-container matColumnDef="rol">
        <th mat-header-cell *matHeaderCellDef>Rol</th>
        <td mat-cell *matCellDef="let u">
          <span class="chip-rol" [ngClass]="colorRol(u.rol)">{{ u.rol }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="fechaAlta">
        <th mat-header-cell *matHeaderCellDef>Alta</th>
        <td mat-cell *matCellDef="let u">{{ u.fechaAlta | date:'dd/MM/yyyy' }}</td>
      </ng-container>
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let u">
          <button mat-icon-button color="primary" (click)="verDetalle(u.id)" matTooltip="Ver detalle">
            <mat-icon>visibility</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="columnas"></tr>
      <tr mat-row *matRowDef="let row; columns: columnas;" class="fila-hover"></tr>
    </table>
  </mat-card>
</div>
