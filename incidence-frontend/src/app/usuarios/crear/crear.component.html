<mat-toolbar color="primary">
  <button mat-icon-button (click)="volver()" matTooltip="Volver"><mat-icon>arrow_back</mat-icon></button>
  <mat-icon>person_add</mat-icon>
  <span class="toolbar-title">Nuevo usuario</span>
  <span class="spacer"></span>
  <button mat-icon-button (click)="cerrarSesion()" matTooltip="Cerrar sesión"><mat-icon>logout</mat-icon></button>
</mat-toolbar>

<div class="form-container">
  <mat-card>
    <mat-card-header>
      <mat-icon mat-card-avatar>person</mat-icon>
      <mat-card-title>Crear usuario</mat-card-title>
      <mat-card-subtitle>Rellena los datos para registrar un nuevo usuario en el sistema</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="guardar()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre" placeholder="Nombre completo" />
          <mat-error *ngIf="form.get('nombre')?.hasError('required')">El nombre es obligatorio</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" placeholder="correo@ejemplo.com" type="email" />
          <mat-error *ngIf="form.get('email')?.hasError('required')">El email es obligatorio</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">Introduce un email válido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Rol</mat-label>
          <mat-select formControlName="rol">
            <mat-option *ngFor="let r of roles" [value]="r">{{ r }}</mat-option>
          </mat-select>
          <mat-error *ngIf="form.get('rol')?.hasError('required')">El rol es obligatorio</mat-error>
        </mat-form-field>

        <div *ngIf="error" class="error-msg">
          <mat-icon>error</mat-icon> No se pudo crear el usuario. Inténtalo de nuevo.
        </div>

        <div class="acciones">
          <button mat-button type="button" (click)="volver()">Cancelar</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || guardando">
            <mat-icon>save</mat-icon>
            {{ guardando ? 'Guardando...' : 'Guardar' }}
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>
</div>
